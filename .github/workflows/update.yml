name: Update Eurojackpot data

on:
  schedule:
    # Draws are Tue & Fri at 20:00 CET/CEST; results appear ~1h later.
    - cron: "30 21 * * 2,5"   # Tue & Fri 21:30 UTC - main run after the draw
    - cron: "0 6 * * 3,6"     # Wed & Sat 06:00 UTC - backup in case results were late
  workflow_dispatch: {}        # allows manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Scrape latest draws
        run: python scraper.py

      - name: Run statistical analysis
        run: python analysis.py

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No new draws." && exit 0
          git commit -m "Auto-update: draws through $(date -u +%F)"
          git push
